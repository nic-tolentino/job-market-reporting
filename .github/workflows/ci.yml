name: CI pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/companies/**/*.json'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'data/companies/**/*.json'
      - 'docs/**'
      - '*.md'

jobs:
  # ---------------------------------------------------------------------------
  # Frontend Build & Test
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Backend Build & Test (Kotlin/Spring)
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build
        run: ./gradlew build -x test

  # ---------------------------------------------------------------------------
  # Crawler Service Build & Test (TypeScript/Node)
  # ---------------------------------------------------------------------------
  crawler-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crawler-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crawler-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
