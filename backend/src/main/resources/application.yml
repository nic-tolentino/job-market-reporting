spring:
  application:
    name: job-market-backend
  cache:
    cache-names:
      - dashboard
      - tech
      - company
    caffeine:
      spec: expireAfterWrite=720h
  cloud:
    gcp:
      bigquery:
        dataset-name: job_market_analysis

management:
  endpoints:
    web:
      exposure:
        include: health,info

apify:
  dataset-id: ${APIFY_DATASET_ID:xB85bR0v20qXfNH5r}
  token: ${APIFY_TOKEN:''}
