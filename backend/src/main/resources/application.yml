spring:
  main:
    lazy-initialization: true
  application:
    name: tech-market-backend
  cache:
    cache-names:
      - landing
      - tech
      - company
      - search
    caffeine:
      spec: expireAfterWrite=720h
  cloud:
    gcp:
      bigquery:
        dataset-name: techmarket

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

apify:
  dataset-id: ${APIFY_DATASET_ID:xB85bR0v20qXfNH5r}
  token: ${APIFY_TOKEN:''}
  webhook-secret: ${APIFY_WEBHOOK_SECRET:default-local-secret}

gcp:
  project-id: ${GCP_PROJECT_ID:tech-market-insights}
  cloud-tasks:
    queue-name: ${CLOUD_TASKS_QUEUE_NAME:tech-market-sync-queue}
    location: ${CLOUD_TASKS_LOCATION:australia-southeast1}

gcs:
  bronze:
    bucket-name: ${GCS_BRONZE_BUCKET:techmarket-bronze-ingestions}
    project-id: ${GCP_PROJECT_ID:tech-market-insights}
    compression-enabled: true

app:
  base-url: ${APP_BASE_URL:https://devassembly.org}

admin:
  panel:
    token: ${ADMIN_PANEL_TOKEN:}

greenhouse:
  base-url: ${GREENHOUSE_BASE_URL:https://boards-api.greenhouse.io/v1}

lever:
  base-url: ${LEVER_BASE_URL:https://api.lever.co/v0}

ashby:
  base-url: ${ASHBY_BASE_URL:https://api.ashbyhq.com}

smartrecruiters:
  base-url: ${SMARTRECRUITERS_BASE_URL:https://api.smartrecruiters.com}

workable:
  base-url: ${WORKABLE_BASE_URL:https://apply.workable.com}

crawler:
  service:
    url: ${CRAWLER_SERVICE_URL:http://localhost:8083}
